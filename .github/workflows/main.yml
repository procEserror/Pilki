name: Minecraft Server

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Playit.gg
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/playit.gpg
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit.list
          sudo apt update
          sudo apt install playit -y

      - name: Run Server
        env:
          # Проверь, что в Settings -> Secrets имя совпадает с этим!
          SECRET_TOKEN: ${{ secrets.PLAYIT_TOKEN }}
        run: |
          # Пытаемся найти start.sh везде и запустить его
          FILE=$(find . -name "start.sh" -print -quit)
          if [ -z "$FILE" ]; then
            echo "ОШИБКА: Файл start.sh не найден в репозитории!"
            exit 1
          fi
          chmod +x "$FILE"
          
          # Запуск туннеля (используем переменную из env)
          playit --secret "$SECRET_TOKEN" &
          
          # Запуск сервера
          cd "$(dirname "$FILE")"
          ./start.sh
